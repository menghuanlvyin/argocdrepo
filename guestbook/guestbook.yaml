apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui
  namespace: guestbook
  labels:
    type: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
        type: ai
        deployrecord: "10"
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: guestbook-ui
  namespace: guestbook
  labels:
    type: ai
    deployrecord: "10"
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: guestbook
